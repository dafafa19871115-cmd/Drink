<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bing Sha 店家接單後台</title>

<link rel="stylesheet" href="style.css">

<style>

body{

background:#f2f2f2;

}

.container{

max-width:900px;

margin:auto;

padding:20px;

}

h1{

text-align:center;

margin-bottom:20px;

color:#ff5722;

}

#orders{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:20px;

}

.order{

background:#fff;

border-radius:12px;

padding:18px;

box-shadow:0 4px 10px rgba(0,0,0,.15);

position:relative;

transition:.25s;

}

.order:hover{

transform:translateY(-3px);

}

.order h2{

margin-bottom:10px;

color:#ff5722;

}

.order p{

margin:8px 0;

font-size:16px;

}

.start{

width:100%;

padding:12px;

margin-top:10px;

background:#2196F3;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

.finish{

width:100%;

padding:12px;

margin-top:10px;

background:#4CAF50;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

.start:hover{

background:#1976D2;

}

.finish:hover{

background:#388E3C;

}

.badge{

position:absolute;

top:-10px;

right:-10px;

background:red;

color:white;

padding:6px 12px;

border-radius:20px;

font-size:14px;

font-weight:bold;

animation:blink .8s infinite;

}

@keyframes blink{

0%{

transform:scale(1);

}

50%{

transform:scale(1.2);

}

100%{

transform:scale(1);

}

}

.new-order{

animation:flash .6s ease 4;

}

@keyframes flash{

0%{

background:#fff59d;

}

100%{

background:white;

}

}

.status{

display:inline-block;

padding:5px 12px;

border-radius:15px;

font-weight:bold;

}

.wait{

background:#FFE082;

}

.making{

background:#90CAF9;

}

.done{

background:#A5D6A7;

}

</style>

</head>

<body>

<div class="container">

<h1>

🧋 Bing Sha 店家接單系統

</h1>

<div id="orders">

</div>

</div>

<audio id="ding" preload="auto">

<source src="ding.mp3" type="audio/mpeg">

</audio>

<script src="admin.js"></script>

</body>

</html>
