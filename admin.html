<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bing Sha v3.0 POS 後台</title>

<link rel="stylesheet" href="style.css">


<style>


body{
margin:0;
background:#f5f5f5;
}


.layout{

display:flex;
min-height:100vh;

}



.sidebar{

width:220px;
background:#ff5722;
color:white;
padding:20px;

}



.sidebar h2{

text-align:center;

}



.sidebar button{

width:100%;
padding:15px;
margin:8px 0;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;

}



.main{

flex:1;
padding:20px;

}



.card{

background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 3px 10px #ddd;

}



.dashboard{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;

}



.number{

font-size:30px;
color:#ff5722;
font-weight:bold;

}



.order{

background:white;
padding:15px;
margin:10px 0;
border-radius:10px;

}


</style>


</head>


<body>


<div class="layout">


<div class="sidebar">


<h2>
🧋 Bing Sha
</h2>


<button onclick="showPage('dashboard')">

📊 今日營運

</button>


<button onclick="showPage('orders')">

📦 訂單管理

</button>


<button onclick="showPage('products')">

🔍 商品管理

</button>


<button onclick="showPage('history')">

📅 歷史訂單

</button>


<button onclick="logout()">

🔐 登出

</button>


</div>




<div class="main">


<div id="content">


</div>


</div>


</div>



<script>


if(localStorage.getItem("shopLogin")!=="true"){

location.href="login.html";

}


</script>


<script src="admin.js"></script>


</body>

</html>
