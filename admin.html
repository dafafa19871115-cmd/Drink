<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bing Sha 接單後台</title>

<style>

  .new-order{

animation:newOrder 0.8s infinite;

border:3px solid #ff9800;

}


@keyframes newOrder{


0%{

transform:scale(1);

}


50%{

transform:scale(1.05);

}


100%{

transform:scale(1);

}


}


.badge{

display:inline-block;

background:#ff5722;

color:white;

padding:5px 10px;

border-radius:20px;

font-weight:bold;

animation:blink 0.5s infinite;

}


@keyframes blink{


50%{

opacity:0.3;

}


}

body{

font-family:"Microsoft JhengHei";

background:#f5f5f5;

padding:20px;

}


h1{

text-align:center;

}


.order{

background:white;

border-radius:15px;

padding:20px;

margin-bottom:15px;

box-shadow:0 3px 10px #ccc;

}


button{

padding:10px 15px;

border:0;

border-radius:10px;

margin:5px;

cursor:pointer;

}


.start{

background:#ffc107;

}


.finish{

background:#4caf50;

color:white;

}


</style>

</head>


<body>


<h1>🧋 Bing Sha 接單後台</h1>


<!-- 今日報表 -->

<div class="order">

<h2>📊 今日營業報表</h2>


<p>
📅 日期：
<span id="reportDate">-</span>
</p>


<p>
🧾 今日訂單：
<span id="reportOrders">0</span> 筆
</p>


<p>
🥤 今日杯數：
<span id="reportCups">0</span> 杯
</p>


<p>
💰 今日營業額：
<span id="reportSales">0</span> 元
</p>


<p>
⏳ 待製作：
<span id="reportPending">0</span>
</p>


<p>
🔥 製作中：
<span id="reportMaking">0</span>
</p>


<p>
✅ 完成：
<span id="reportDone">0</span>
</p>


</div>



<div id="orders">

載入訂單中...

</div>


<audio id="ding" src="ding.mp3"></audio>



<script src="admin.js"></script>


</body>

</html>
