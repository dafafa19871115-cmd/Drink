<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bing Sha v3.0 POS 後台</title>

<link rel="stylesheet" href="style.css">


<style>


body{

margin:0;

background:#f5f5f5;

font-family:
Arial,
"Microsoft JhengHei",
sans-serif;

}



.layout{

display:flex;

min-height:100vh;

}




.sidebar{

width:220px;

background:#ff5722;

color:white;

padding:20px;

box-sizing:border-box;

}




.sidebar h2{

text-align:center;

margin-bottom:30px;

}




.sidebar button{


width:100%;

padding:15px;

margin:8px 0;

border:none;

border-radius:8px;

cursor:pointer;

font-size:16px;

background:white;

color:#ff5722;


}



.sidebar button:hover{

background:#ffe0d5;

}





.main{

flex:1;

padding:20px;

}





.card{


background:white;

padding:20px;

border-radius:15px;

margin-bottom:20px;

box-shadow:
0 3px 10px #ddd;


}




.dashboard{


display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;


}




.number{


font-size:32px;

color:#ff5722;

font-weight:bold;


}





.order{


background:white;

padding:15px;

margin:10px 0;

border-radius:10px;

box-shadow:
0 2px 8px #ddd;


}




.status{


display:inline-block;

padding:5px 12px;

border-radius:15px;

font-weight:bold;


}



.wait{

background:#FFE082;

}



.making{

background:#90CAF9;

}



.done{

background:#A5D6A7;

}





.badge{


background:red;

color:white;

padding:5px 10px;

border-radius:15px;

display:inline-block;


}




input[type="date"]{


padding:10px;

font-size:16px;

border-radius:8px;

border:1px solid #ccc;


}



</style>


</head>



<body>



<div class="layout">



<!-- 左側選單 -->


<div class="sidebar">


<h2>

🧋 Bing Sha

</h2>



<button onclick="showPage('dashboard')">

📊 今日營運

</button>



<button onclick="showPage('orders')">

📦 訂單管理

</button>



<button onclick="showPage('products')">

🔍 商品管理

</button>



<button onclick="showPage('history')">

📅 歷史訂單

</button>



<button onclick="logout()">

🔐 登出

</button>



</div>





<!-- 右側內容 -->


<div class="main">


<div id="content">

</div>


</div>



</div>





<script>


// 登入保護


if(
localStorage.getItem("shopLogin")
!=="true"
){

location.href="login.html";

}



</script>



<script src="admin.js"></script>



</body>


</html>
