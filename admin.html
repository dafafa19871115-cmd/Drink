<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bing Sha 接單後台</title>


<style>


*{
box-sizing:border-box;
}


body{

font-family:
"Microsoft JhengHei",
Arial,
sans-serif;

background:#f5f5f5;

padding:15px;

margin:0;

}



h1{

text-align:center;

font-size:26px;

}




.box{

background:white;

border-radius:18px;

padding:18px;

margin-bottom:15px;

box-shadow:
0 3px 10px rgba(0,0,0,0.12);

}




.status{

font-size:22px;

font-weight:bold;

text-align:center;

padding:10px;

border-radius:15px;

}



.open{

background:#d8ffd8;

color:#198754;

}



.close{

background:#ffd9d9;

color:#dc3545;

}



.order{


background:white;

border-radius:18px;

padding:18px;

margin-bottom:15px;

box-shadow:
0 3px 10px rgba(0,0,0,0.12);


}



.new-order{

border:3px solid #ff9800;

animation:newOrder 0.8s infinite;

}



@keyframes newOrder{


50%{

transform:scale(1.03);

}


}





.badge{

display:inline-block;

background:#ff5722;

color:white;

padding:6px 12px;

border-radius:20px;

font-weight:bold;

}



button{


width:100%;

padding:14px;

margin-top:8px;

border:0;

border-radius:12px;

font-size:18px;

}



.start{

background:#ffc107;

}



.finish{

background:#4caf50;

color:white;

}



.checkout{

background:#ff9800;

color:white;

}



.search{

display:flex;

gap:10px;

}



.search input{


flex:1;

padding:12px;

font-size:16px;

border-radius:10px;

border:1px solid #ccc;


}



.search button{


width:100px;

background:#2196f3;

color:white;


}




.report-grid{


display:grid;

grid-template-columns:1fr 1fr;

gap:10px;


}



.report-item{


background:#fafafa;

padding:12px;

border-radius:12px;

text-align:center;


}




@media(max-width:600px){



h1{

font-size:24px;

}



.report-grid{


grid-template-columns:1fr 1fr;


}



.order h2{

font-size:22px;

}


}



</style>


</head>



<body>



<h1>

🧋 Bing Sha 接單後台

</h1>





<!-- 營業狀態 -->

<div class="box">


<div id="businessStatus"

class="status">

檢查營業狀態中...

</div>


</div>







<!-- 報表 -->


<div class="box">


<h2>
📊 營業報表
</h2>



<div class="search">


<input

type="date"

id="reportDateInput">


<button onclick="searchReport()">

查詢

</button>


</div>





<br>



<div class="report-grid">


<div class="report-item">

🧾 訂單

<br>

<span id="reportOrders">
0
</span>

</div>



<div class="report-item">

🥤 杯數

<br>

<span id="reportCups">
0
</span>

</div>




<div class="report-item">

💰 金額

<br>

<span id="reportSales">
0
</span>

</div>




<div class="report-item">

⏳ 待製作

<br>

<span id="reportPending">
0
</span>

</div>



<div class="report-item">

🔥 製作中

<br>

<span id="reportMaking">
0
</span>

</div>



<div class="report-item">

✅ 完成

<br>

<span id="reportDone">
0
</span>

</div>



</div>



<button

class="checkout"

onclick="checkoutToday()">

💰 今日結帳

</button>



</div>








<!-- 訂單 -->

<div id="orders">


載入訂單中...


</div>







<audio

id="ding"

src="ding.mp3">

</audio>





<script src="admin.js"></script>


</body>

</html>
