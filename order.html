<link rel="stylesheet" href="style.css">


<style>


body{

background:#f5f5f5;

}



.container{

max-width:500px;

margin:auto;

padding:20px;

}



.box{

background:white;

padding:25px;

border-radius:15px;

text-align:center;

box-shadow:0 4px 12px #ddd;

}



.order-number{

font-size:45px;

font-weight:bold;

color:#ff5722;

}



.status{

font-size:25px;

padding:15px;

border-radius:10px;

margin-top:20px;

}



.wait{

background:#FFE082;

}



.making{

background:#90CAF9;

}



.done{

background:#A5D6A7;

}



.notice{

font-size:22px;

margin-top:20px;

animation:flash 1s infinite;

}



@keyframes flash{


50%{

opacity:.3;

}


}



</style>
